name: Release Desktop Agent (.exe)

# Cut a release: bump VERSION in "desktop-app/version.py", then
#   git tag v1.0.1 && git push origin v1.0.1
# This builds the exe on Windows and attaches it to the GitHub Release for the tag.
# Running installs auto-update from that release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build executable
        run: python build_exe.py
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "desktop-app/dist/PetabyteAgent.exe"
          fail_on_unmatched_files: true
