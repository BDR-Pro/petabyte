# Rate-limit zones (http context — this file is included inside http{} via sites-enabled).
# auth: brute-force / spam protection on sensitive endpoints. api: general ceiling.
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;

server {
    listen 80;
    server_name petabyte.market;

    client_max_body_size 4m;

    # tight limits on auth + money endpoints (burst absorbs legit bursts, then 503s abusers)
    location = /login          { limit_req zone=auth burst=10 nodelay; proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /register_user  { limit_req zone=auth burst=5  nodelay; proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /create_api_key { limit_req zone=auth burst=5  nodelay; proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /deposit        { limit_req zone=auth burst=5  nodelay; proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }
    location = /auth/google/callback { limit_req zone=auth burst=5 nodelay; proxy_pass http://127.0.0.1:8000; include /etc/nginx/proxy_params; }

    location = /healthz { proxy_pass http://127.0.0.1:8000/healthz; access_log off; }

    # everything else, general ceiling
    location / {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }
}
